services:
  api:
    build:
      context: ../backend
    ports:
      - "${API_PORT:-8081}:8080"
    environment:
      ADDR: "${API_ADDR:-:8080}"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE:-disable}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/uploads}"
      OIDC_ISSUER: "${OIDC_ISSUER}"
      OIDC_JWKS_URL: "${OIDC_JWKS_URL}"
    depends_on:
      - db
      - keycloak
    restart: unless-stopped
    volumes:
      - uploads_data:/uploads

  frontend:
    build:
      context: ../frontend
      args:
        VITE_KEYCLOAK_URL: "${VITE_KEYCLOAK_URL}"
        VITE_KEYCLOAK_REALM: "${VITE_KEYCLOAK_REALM}"
        VITE_KEYCLOAK_CLIENT_ID: "${VITE_KEYCLOAK_CLIENT_ID}"
        VITE_USE_MOCKS: "${VITE_USE_MOCKS:-true}"
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
        VITE_DETECTIONS_QUERY_ENDPOINT: "${VITE_DETECTIONS_QUERY_ENDPOINT:-/api/v1/detections:query}"
    restart: unless-stopped

  nginx:
    image: nginx:1.28-alpine
    ports:
      - "${NGINX_PORT:-8443}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/uploads:ro
    depends_on:
      - api
      - frontend
      - keycloak
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${KEYCLOAK_DB_NAME:-keycloak}"
      POSTGRES_USER: "${KEYCLOAK_DB_USER:-keycloak}"
      POSTGRES_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    restart: unless-stopped
    depends_on:
      - keycloak-db
    volumes:
      - ./keycloak/themes/forestmap:/opt/keycloak/themes/forestmap:ro
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}"
      KC_DB_USERNAME: "${KEYCLOAK_DB_USER:-keycloak}"
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME:-http://localhost:8443/auth}"
    command:
      - start-dev
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-18080}:8080"

volumes:
  postgres_data:
  uploads_data:
  keycloak_pgdata:
