services:
  api:
    build:
      context: ../backend
    ports:
      - "${API_PORT:-8081}:8080"
    environment:
      ADDR: "${API_ADDR:-:8080}"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE:-disable}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/uploads}"
      OIDC_ISSUER: "${OIDC_ISSUER}"
      OIDC_JWKS_URL: "${OIDC_JWKS_URL}"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - uploads_data:/uploads

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.28-alpine
    ports:
      - "${NGINX_PORT:-8443}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/uploads:ro
    depends_on:
      - api
      - frontend
      - keycloak
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4-alpine
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${KEYCLOAK_DB_NAME:-keycloak}"
      POSTGRES_USER: "${KEYCLOAK_DB_USER:-keycloak}"
      POSTGRES_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    restart: unless-stopped
    depends_on:
      - keycloak-db
    environment:
      # Bootstrap admin (важно при первом запуске / новом volume)
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"

      # DB
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}"
      KC_DB_USERNAME: "${KEYCLOAK_DB_USER:-keycloak}"
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"

      # Reverse proxy / base path
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth

      # Какой внешний URL видит Keycloak (через nginx)
      # Для вашего случая: http://localhost:8443/auth
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME:-http://localhost:8443/auth}"
    command:
      - start-dev
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-18080}:8080"

volumes:
  postgres_data:
  uploads_data:
  keycloak_pgdata:
